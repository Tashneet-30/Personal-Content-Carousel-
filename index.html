<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI News Hub — by Tashneet Kaur</title>
  <meta name="description" content="AI News Hub — Curated AI news, Instagram carousel generator, and learning platform by Tashneet Kaur. Stay updated on AI agents, LLMs, startups, tools, and research.">
  <meta name="keywords" content="AI news, artificial intelligence, machine learning, Instagram carousel, AI agents, LLMs, Tashneet Kaur">
  <meta name="author" content="Tashneet Kaur">

  <!-- Open Graph -->
  <meta property="og:title" content="AI News Hub — by Tashneet Kaur">
  <meta property="og:description" content="Curated AI news, Instagram carousel generator, and learning platform.">
  <meta property="og:type" content="website">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">

  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- ========== NAVIGATION ========== -->
  <nav id="main-nav" class="navbar">
    <div class="nav-container">
      <a href="#dashboard" class="nav-logo">
        <span class="logo-icon">🧠</span>
        <span class="logo-text">AI News <span class="logo-highlight">Hub</span></span>
      </a>

      <div class="nav-links" id="nav-links">
        <a href="#dashboard" class="nav-link active" data-page="dashboard">
          <span class="nav-icon">📰</span> Dashboard
        </a>
        <a href="#carousel" class="nav-link" data-page="carousel">
          <span class="nav-icon">📸</span> Create Carousel
        </a>
        <a href="#explore" class="nav-link" data-page="explore">
          <span class="nav-icon">🔍</span> Explore
        </a>
        <a href="#profile" class="nav-link" data-page="profile">
          <span class="nav-icon">👤</span> Profile
        </a>
      </div>

      <button class="nav-mobile-toggle" id="mobile-toggle" aria-label="Toggle navigation">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>
  </nav>

  <!-- ========== MAIN CONTENT ========== -->
  <main id="app">
    <!-- Dashboard Page -->
    <section id="page-dashboard" class="page active">
      <div class="page-content"></div>
    </section>

    <!-- Carousel Generator Page -->
    <section id="page-carousel" class="page">
      <div class="page-content"></div>
    </section>

    <!-- Explore Page -->
    <section id="page-explore" class="page">
      <div class="page-content"></div>
    </section>

    <!-- Profile Page -->
    <section id="page-profile" class="page">
      <div class="page-content"></div>
    </section>
  </main>

  <!-- ========== CAROUSEL EDITOR MODAL ========== -->
  <div id="carousel-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content carousel-modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="carousel-editor-root"></div>
    </div>
  </div>

  <!-- ========== ARTICLE DETAIL MODAL ========== -->
  <div id="article-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content article-modal-content">
      <button class="modal-close" id="article-modal-close">&times;</button>
      <div id="article-detail-root"></div>
    </div>
  </div>

  <!-- ========== HIDDEN EXPORT CONTAINER ========== -->
  <div id="export-container" style="position:fixed;left:-9999px;top:0;z-index:-1;"></div>

  <!-- ========== TOAST NOTIFICATIONS ========== -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
